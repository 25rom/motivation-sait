    <script>
    /* Патч набора символов: Истинность исключена, Уважение добавлено.

    <script>
        const STATES = (window.PRANAWAY_STATES || []);
        const SYMS = (window.PRANAWAY_SYMBOLS || []);
        const content = document.getElementById('content');
        const deckNav = document.getElementById('deckNav');
        const deckHome = document.getElementById('deckHome');
        const deckChevron = document.getElementById('deckChevron');
        const deckList = document.getElementById('deckList');
        const overlayList = document.getElementById('overlayList');
        const mobileCurrent = document.getElementById('mobileCurrent');

        const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        const isFull = st => st.narrative && st.narrative.length > 0;

        /* ---------- символы ---------- */
        const symById = id => SYMS.find(s => s.id === id) || null;

        // Детерминированный «рандом» от слага: у каждого состояния — свой постоянный набор
        function seededPick(slug, pool, n) {
            let h = 2166136261;
            for (let i = 0; i < slug.length; i++) { h ^= slug.charCodeAt(i); h = Math.imul(h, 16777619); }
            const rnd = () => { h ^= h << 13; h ^= h >>> 17; h ^= h << 5; return ((h >>> 0) / 4294967296); };
            const arr = pool.slice();
            for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(rnd() * (i + 1)); const t = arr[i]; arr[i] = arr[j]; arr[j] = t; }
            return arr.slice(0, n);
        }

        function stateSymbolsRow(st) {
            if (!SYMS.length) return '';
            const own = symById(st.slug);
            const others = SYMS.filter(s => s.id !== st.slug);
            const count = 3 + (st.slug.length % 2); // 3 или 4 всего
            const picked = seededPick(st.slug, others, own ? count - 1 : count);
            let html = '<div class="state-syms" aria-hidden="true">';
            if (own) html += '<span class="own" title="' + esc(own.name) + '">' + own.petro + '</span>';
            picked.forEach((s, i) => { html += '<span>' + (i % 2 ? s.alch : s.petro) + '</span>'; });
            return html + '</div>';
        }

        function tileSymbol(st) {
            const own = symById(st.slug);
            return own ? own.petro : '';
        }

        /* ---------- вводное эссе колоды (текст автора) ---------- */
        const DECK_ESSAY = [
            'Все эти состояния — это активное действие, акт. Фактически, пассивное — то, что действует на человека, активное — где человек применяет волю, действует сам. Поэтому эти понятия, как активные состояния личности, являются ценными по себе уже тем, что проявляются осознанно, идут снизу вверх, по мере нравственного развития личности. Прежде всего — базовые состояния, напрямую связанные с волей и достижением, инстинктом; они переходят в общечеловеческое и в самом верху — надличностное, то есть то, что стоит выше собственного я, своего Эго.',
            'Чтобы состояние служило во благо, оно должно быть осознано и прожито — то есть интегрировано в саму суть психики, восприятия. Не по шаблону, не по стандарту, не по предписанию и догме. А по-настоящему — осмысленно, прожито и осознанно, тогда оно станет частью личности, вернее — раскроется потенциал, который несёт в себе изначально, как функцию души, заложенной в самой её сути.',
            'Следует наделать кучу ошибок, будучи эмоционально прямолинейным, а не искренним, неуместно вываливая всё напоказ, думая, что открыт перед людьми, грубым и жёстким — проявляя упорство или стойкость. Всё это часть процесса взросления личности, и это не про возраст, а про опыт жизни, опыт проживания и этической трансформации — не потому, что кто-то так решил и в обществе принято быть уместным, — а потому, что так того требует Душа.',
            'Это невозможно объяснить, это можно только прожить — и лишь тогда это станет своим собственным, в отличие от концептуальных знаний и философствований, которые только как одежда или внешняя конструкция цепляются на живое тело.'
        ];
        const DECK_ESSAY_FINAL = 'Это — процесс, здесь нет конечного состояния. Это жизнь — живите каждый день, познавая что-то новое, открывая непознанные грани себя, проживайте каждый день со своими частями, со временем становясь однородным и цельным, как того требует от нас сама природа, сам факт существования человека как существа!';

        function deckEssay() {
            return '<div class="deck-essay">' +
                '<div class="essay-rule" aria-hidden="true"></div>' +
                '<div class="eyebrow">О природе состояний</div>' +
                DECK_ESSAY.map(p => '<p>' + p + '</p>').join('') +
                '<p class="essay-final">' + DECK_ESSAY_FINAL + '</p>' +
                '</div>';
        }

        /* ---------- аккордеон колоды ---------- */
        let deckOpenManual = null; // null = авто, true/false = выбор пользователя
        function setDeckOpen(open) {
            deckNav.classList.toggle('open', open);
            deckChevron.setAttribute('aria-expanded', open ? 'true' : 'false');
        }
        deckChevron.addEventListener('click', () => {
            deckOpenManual = !deckNav.classList.contains('open');
            setDeckOpen(deckOpenManual);
        });
        deckHome.addEventListener('click', () => {
            deckOpenManual = true; setDeckOpen(true); // клик по «Колоде» раскрывает список
        });

        function trackHit(title) {
            if (window.ym) { window.ym(105895834, 'hit', location.href, { title: title }); }
        }

        /* ---------- боковое меню ---------- */
        function buildLists() {
            // Пиктограммы берутся из symbols.js по слагу — меняются там, в коде страницы не зашиты
            const items = STATES.map(st => {
                const sym = tileSymbol(st);
                return '<li><a href="#' + st.slug + '" data-slug="' + st.slug + '">' +
                    (sym ? '<span class="tile-sym">' + sym + '</span>' : '') +
                    '<span class="nm">' + esc(st.title) + '</span>' +
                    (isFull(st) ? '<span class="full-dot" title="полный нарратив"></span>' : '') +
                    '</a></li>';
            }).join('');
            deckList.innerHTML = items;
            overlayList.innerHTML =
                '<li><a href="#" data-slug="" style="font-family:\'Playfair Display\',serif;font-size:1.05rem;">Колода состояний</a></li>' + items;
        }

        function markActive(slug) {
            document.querySelectorAll('.deck-list a').forEach(a => {
                a.classList.toggle('active', !!slug && a.dataset.slug === slug);
            });
            deckHome.classList.toggle('here', !slug);
            if (slug) {
                if (deckOpenManual === null) setDeckOpen(true); // открытое состояние → показать колоду
                const act = deckList.querySelector('a.active');
                if (act) act.scrollIntoView({ block: 'nearest' });
            } else if (deckOpenManual === null) {
                setDeckOpen(false);
            }
        }

        function toggleOverlay(open) {
            const ov = document.getElementById('deckOverlay');
            ov.classList.toggle('open', open);
            ov.setAttribute('aria-hidden', open ? 'false' : 'true');
            document.body.style.overflow = open ? 'hidden' : '';
        }
        overlayList.addEventListener('click', e => { if (e.target.closest('a')) toggleOverlay(false); });

        /* ---------- семенная фраза ---------- */
        function seedBlock(st) {
            return '<div class="seed-wrap"><div class="seed-block">' +
                '<div class="s-label">Семенная фраза · ключ-код</div>' +
                '<div class="s-text">' + esc(st.seed) + '</div>' +
                '</div></div>';
        }

        /* ---------- статья состояния ---------- */
        function renderState(st) {
            const i = STATES.indexOf(st);
            const prev = STATES[(i - 1 + STATES.length) % STATES.length];
            const next = STATES[(i + 1) % STATES.length];
            const num = String(i + 1).padStart(2, '0');

            // На странице состояния — только нарратив (семенная фраза и вопрос-ключ
            // живут на обороте карты в боте). Пока текста нет — плейсхолдер.
            let body = '';
            if (isFull(st)) {
                body = '<div class="narrative">' + st.narrative.map(p => '<p>' + esc(p) + '</p>').join('') + '</div>';
            } else {
                body = '<div class="loading-note">Текст загружается…</div>';
            }

            content.innerHTML =
                '<article class="state-article">' +
                '<div class="eyebrow">Колода состояний · ' + num + ' / ' + STATES.length + '</div>' +
                '<h1>' + esc(st.title) + '</h1>' +
                stateSymbolsRow(st) +
                body +
                '<div class="state-actions">' +
                '<a href="https://t.me/o_cardbot" class="cta-btn">Вытянуть карточку</a>' +
                '<div class="hint">цифровая версия колоды — в telegram</div>' +
                '</div>' +
                '<nav class="state-footer-nav">' +
                '<a href="#' + prev.slug + '"><span class="dir">← Предыдущее</span>' + esc(prev.title) + '</a>' +
                '<a href="#' + next.slug + '" class="next"><span class="dir">Следующее →</span>' + esc(next.title) + '</a>' +
                '</nav>' +
                '</article>';

            document.title = st.title + ' — Pranaway';
            mobileCurrent.textContent = st.title;
            markActive(st.slug);
            trackHit(document.title);
            window.scrollTo({ top: 0, behavior: 'auto' });
        }

        /* ---------- обзор колоды ---------- */
        function renderIndex() {
            content.innerHTML =
                '<div class="deck-index">' +
                '<div class="eyebrow">Карманные талисманы</div>' +
                '<h1>Колода состояний</h1>' +
                '<p class="deck-intro">Каждая карта — это состояние, в которое можно проникнуть и носить с собой. На лице — символ и название, на обороте — семенная фраза и QR, который ведёт сюда: к полному нарративу, смыслу и вопросу-ключу.</p>' +
                '<p class="deck-intro">Выбери состояние из колоды — или доверь выбор случаю и вытяни карточку в боте.</p>' +
                deckEssay() +
                '<div class="state-actions"><a href="https://t.me/o_cardbot" class="cta-btn">Вытянуть карточку</a></div>' +
                '</div>';

            document.title = 'Состояния — Pranaway';
            mobileCurrent.textContent = 'Колода состояний';
            markActive(null);
            trackHit(document.title);
        }

        /* ---------- роутер: #slug или ?s=slug ---------- */
        function currentSlug() {
            const q = new URLSearchParams(location.search).get('s');
            const h = decodeURIComponent(location.hash.replace(/^#/, ''));
            return (q || h || '').trim().toLowerCase();
        }

        function route() {
            const slug = currentSlug();
            const st = STATES.find(s => s.slug === slug);
            if (st) { renderState(st); } else { renderIndex(); }
        }

        if (!STATES.length) {
            content.innerHTML = '<p style="padding-top:10px;">Не найден файл данных <b>states.js</b>. Положи его рядом с этой страницей.</p>';
        } else {
            buildLists();
            route();
            window.addEventListener('hashchange', route);
        }
    </script>
</body>
</html>
